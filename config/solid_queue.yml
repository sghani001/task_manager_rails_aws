# config/solid_queue.yml
---
default: &default
  queues:
    - default
    - critical
  batch_size: 500
  polling_interval: 0.1

development:
  <<: *default

test:
  <<: *default
  polling_interval: 0.001

production:
  <<: *default
  workers:
    - queues: [ default, critical ]
      threads: 5
      processes: 1
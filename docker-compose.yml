version: "3.9"

services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: task_manager_development
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      RAILS_ENV: development
      DATABASE_URL: postgres://postgres:postgres@db:5432/task_manager_development
      RAILS_MASTER_KEY: ${RAILS_MASTER_KEY:-b810523f70a77df261697136e2c0c922}
      MISSION_CONTROL_USERNAME: admin
      MISSION_CONTROL_PASSWORD: changeme
      DATABASE_USERNAME: postgres
      DATABASE_PASSWORD: postgres
      DATABASE_HOST: db
      PGSSLMODE: disable
    ports:
      - "80:80"
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
